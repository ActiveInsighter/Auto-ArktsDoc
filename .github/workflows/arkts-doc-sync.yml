name: ArkTS Doc Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arkts-doc-sync
  cancel-in-progress: false

jobs:
  crawl-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ArktsDocScript/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ArktsDocScript/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Crawl ArkTS docs to HTML
        run: |
          python ArktsDocScript/fetch-html.py \
            --targets-file ArktsDocScript/huawei_targets.txt \
            --output-dir ArktsDocScript/build/huawei_docs \
            --max-pages 200 \
            --concurrency 5 \
            --page-timeout-ms 20000 \
            --scroll-passes 4 \
            --scroll-wait-ms 80 \
            --render-poll-ms 100 \
            --fast-mode

      - name: Convert HTML to Markdown
        run: |
          python ArktsDocScript/html_to_md.py \
            --input-dir ArktsDocScript/build/huawei_docs/pages \
            --output-dir ArktsDocScript/generated/huawei_md \
            --preserve-links

      - name: Commit Markdown to branch
        run: |
          TARGET_BRANCH="arkts-docs"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$TARGET_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$TARGET_BRANCH"; then
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git checkout -B "$TARGET_BRANCH"
          fi
          git add ArktsDocScript/generated/huawei_md
          if git diff --cached --quiet; then
            echo "No Markdown changes to commit."
            exit 0
          fi
          git commit -m "docs: sync ArkTS Markdown"
          git push origin HEAD:"$TARGET_BRANCH"